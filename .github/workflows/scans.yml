name: Scans

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

  schedule:
  - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:

  pylint-scan:
    name: Pylint Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -r requirements.txt

      - name: Run Pylint
        run: |
          pylint dbt/adapters/db2/ --output-format=json > pylint-report.json || true
          pylint dbt/adapters/db2/ || true

      - name: Upload Pylint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pylint-quality-report
          path: pylint-report.json

  bandit-scan:
    name: Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          pip install -e .
          pip install -r dev-requirements.txt

      - name: Run Bandit
        run: |
          bandit -r dbt/adapters/db2 \
            -f json \
            -o bandit-report.json || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-security-report
          path: bandit-report.json
