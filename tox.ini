[tox]
skipsdist = True
envlist = py39,py310,py311,py312,lint

[testenv:{unit,py39,py310,py311,py312,py}]
description = unit testing
skip_install = true
passenv =
    DBT_*
    PYTEST_ADDOPTS
commands = {envpython} -m pytest {posargs} tests/unit
deps =
  -rdev-requirements.txt
  -e.

[testenv:lint]
description = run linters
deps =
    flake8
commands =
    flake8 dbt

[testenv:{integration,py39,py310,py311,py312,py}-{db2}]
description = Db2 adapter plugin integration testing
skip_install = true
passenv =
    DBT_*
    DB2_TEST_*
    PYTEST_ADDOPTS
    DD_CIVISIBILITY_AGENTLESS_ENABLED
    DD_API_KEY
    DD_SITE
    DD_ENV
    DD_SERVICE
commands =
  db2: {envpython} -m pytest {posargs} -m profile_db2 tests/integration
  db2: {envpython} -m pytest {posargs} tests/functional
deps =
  -rdev-requirements.txt
  -e.
