fixed:
  type: db2
prompts:
  host:
    hint: 'hostname for the instance'
  port:
    default: 50000
    type: 'int'
  user:
    hint: 'dev username'
  password:
    hint: 'dev password'
    hide_input: true
  database:
    hint: 'default database that dbt will build objects in'
  schema:
    hint: 'default schema that dbt will build objects in'
    default: ADMIN
  security:
    hint: '[Optional] Security protocol: SSL (enable SSL) - press Enter to skip'
    default: ''
  ssl_server_certificate:
    hint: '[Optional] Path to server CA certificate file - press Enter to skip'
    default: ''
  threads:
    hint: '1 or more'
    type: 'int'
    default: 8

